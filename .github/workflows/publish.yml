name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      # FIRST-PUBLISH BOOTSTRAP (token auth): a Trusted Publisher can't authorize
      # a package that doesn't exist yet, so the very first publish authenticates
      # with NPM_TOKEN. Provenance is still signed via OIDC (id-token: write).
      # AFTER this first version lands: add the Trusted Publisher on npmjs, revoke
      # the token, and DELETE the `env:` block below to revert to pure OIDC.
      # npm 11.5.1+ needed (runner ships 10.x) → fetch a fresh npm via npx.
      - name: Publish
        run: npx -y npm@latest publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
